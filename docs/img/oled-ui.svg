<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 430" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="560" height="430" fill="#ffffff"/>
  <text x="32" y="40" font-size="24" font-weight="700" fill="#11201a">On-device UI</text>
  <text x="32" y="62" font-size="14" fill="#5b6b64">SSD1306 128×64 OLED — the home screen, driven by the rotary encoder.</text>

  <!-- OLED module PCB -->
  <rect x="60" y="92" width="440" height="296" rx="14" fill="#16324a" stroke="#0e2233"/>
  <!-- mounting holes -->
  <circle cx="84" cy="116" r="8" fill="#0e2233"/>
  <circle cx="476" cy="116" r="8" fill="#0e2233"/>
  <circle cx="84" cy="364" r="8" fill="#0e2233"/>
  <circle cx="476" cy="364" r="8" fill="#0e2233"/>
  <!-- 4-pin I2C header -->
  <text x="280" y="110" text-anchor="middle" font-size="11" fill="#9fc7e6" font-family="'DejaVu Sans Mono', monospace">GND  ·  VCC  ·  SCL (GPIO8)  ·  SDA (GPIO7)</text>

  <!-- screen glass -->
  <rect x="96" y="128" width="368" height="220" rx="6" fill="#05060a"/>
  <rect x="104" y="136" width="352" height="204" rx="3" fill="#000000"/>

  <!-- screen text (monochrome OLED look) -->
  <g font-family="'DejaVu Sans Mono', ui-monospace, monospace" font-size="20" fill="#dff3ec" letter-spacing="0.5">
    <text x="118" y="164" font-weight="700">pixfrog</text>
    <text x="118" y="190">IP   : 192.168.1.42</text>
    <text x="118" y="216">LINK : UP</text>
    <text x="118" y="242">FPS  : 60</text>
    <text x="118" y="268">Pkts : 18342</text>
    <text x="118" y="300">CH 1 2 3 4 5 6 7 8</text>
    <text x="118" y="324">   <tspan fill="#7bdcb5">* * *</tspan> - - <tspan fill="#7bdcb5">* *</tspan> -</text>
  </g>

  <text x="280" y="412" text-anchor="middle" font-size="12.5" fill="#5b6b64" font-family="system-ui, sans-serif">
    <tspan fill="#167a41" font-weight="700">*</tspan> recent DMX  ·  <tspan font-weight="700">-</tspan> idle  ·  <tspan font-weight="700">!</tspan> over-capacity
  </text>
</svg>
