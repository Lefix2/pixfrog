<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>pixfrog config</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 monospace;background:#1a1a2e;color:#e0e0e0;padding:12px}
h1{color:#ffd700;font-size:18px;margin-bottom:12px}
h2{color:#aaa;font-size:13px;margin:16px 0 6px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #333;padding-bottom:4px}
.card{background:#16213e;border:1px solid #2a2a4a;border-radius:6px;padding:12px;margin-bottom:8px}
.row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.row label{width:140px;flex-shrink:0;color:#aaa;font-size:13px}
.row input,.row select{flex:1;background:#0f3460;border:1px solid #4a4a7a;border-radius:4px;color:#e0e0e0;padding:4px 8px;font:13px monospace;min-width:0}
.row input[type=checkbox]{width:18px;height:18px;flex:none;accent-color:#ffd700}
.note{font-size:11px;color:#888;margin-left:8px}
button{background:#e94560;border:none;border-radius:4px;color:#fff;cursor:pointer;font:13px monospace;padding:6px 18px;margin-top:4px}
button:hover{background:#ff6b6b}
button.sec{background:#0f3460;border:1px solid #4a4a7a}
button.sec:hover{background:#1a4a8a}
.status{font-size:12px;color:#0f0;margin-top:6px;min-height:16px}
.status.err{color:#f55}
.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tab{background:#0f3460;border:1px solid #4a4a7a;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px}
.tab.active{background:#e94560;border-color:#e94560;color:#fff}
.panel{display:none}.panel.active{display:block}
#header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
#link-dot{width:10px;height:10px;border-radius:50%;background:#f55;flex-shrink:0}
#link-dot.up{background:#0f0}
#fps-label{color:#888;font-size:12px}
</style>
</head>
<body>
<div id="header">
  <h1>&#128438; pixfrog</h1>
  <div id="link-dot" title="Ethernet link"></div>
  <span id="fps-label">--fps</span>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-panel="global">Global</div>
  <div class="tab" data-panel="network">Network</div>
  <div class="tab" data-panel="artnet">ArtNet</div>
  <div class="tab" data-panel="ch0">Ch1</div>
  <div class="tab" data-panel="ch1">Ch2</div>
  <div class="tab" data-panel="ch2">Ch3</div>
  <div class="tab" data-panel="ch3">Ch4</div>
  <div class="tab" data-panel="ch4">Ch5</div>
  <div class="tab" data-panel="ch5">Ch6</div>
  <div class="tab" data-panel="ch6">Ch7</div>
  <div class="tab" data-panel="ch7">Ch8</div>
</div>

<!-- Global panel -->
<div class="panel active" id="panel-global">
  <div class="card">
    <div class="row"><label>Refresh rate</label>
      <select id="g-refresh"><option value="30">30 Hz</option><option value="60">60 Hz</option></select>
    </div>
    <div class="row"><label>Home timeout</label>
      <input id="g-home" type="number" min="0" max="65535">
      <span class="note">seconds (0=never)</span>
    </div>
    <div class="row"><label>Web UI</label>
      <input id="g-web" type="checkbox">
      <span class="note">requires reboot to disable</span>
    </div>
    <button onclick="saveGlobal(['refresh_hz','home_timeout_s','web_enabled'])">Save</button>
    <div class="status" id="st-global"></div>
  </div>
  <div class="card">
    <button class="sec" onclick="factoryReset()">Factory reset</button>
    <button class="sec" onclick="reboot()" style="margin-left:8px">Reboot</button>
    <div class="status" id="st-sys"></div>
  </div>
</div>

<!-- Network panel -->
<div class="panel" id="panel-network">
  <div class="card">
    <div class="row"><label>DHCP</label><input id="n-dhcp" type="checkbox"></div>
    <div class="row"><label>Static IP</label><input id="n-ip" type="text" placeholder="192.168.1.100"></div>
    <div class="row"><label>Subnet mask</label><input id="n-mask" type="text" placeholder="255.255.255.0"></div>
    <div class="row"><label>Gateway</label><input id="n-gw" type="text" placeholder="192.168.1.1"></div>
    <button onclick="saveGlobal(['dhcp','ip','mask','gw'])">Save</button>
    <span class="note">network changes apply after reboot</span>
    <div class="status" id="st-network"></div>
  </div>
</div>

<!-- ArtNet panel -->
<div class="panel" id="panel-artnet">
  <div class="card">
    <div class="row"><label>Net (0–127)</label><input id="a-net" type="number" min="0" max="127"></div>
    <div class="row"><label>Subnet (0–15)</label><input id="a-subnet" type="number" min="0" max="15"></div>
    <div class="row"><label>Short name</label><input id="a-short" type="text" maxlength="17"></div>
    <div class="row"><label>Long name</label><input id="a-long" type="text" maxlength="63"></div>
    <div class="row"><label>Reply unicast</label><input id="a-unicast" type="checkbox"></div>
    <button onclick="saveGlobal(['net','subnet','short_name','long_name','reply_unicast'])">Save</button>
    <div class="status" id="st-artnet"></div>
  </div>
</div>

<!-- Channel panels (ch0..ch7) -->
<script>
const PROTOCOLS=['Off','WS2815','WS2812B','WS2811','SK6812','WS2814','APA102','SK9822','LPD8806','DMX512'];
const ORDERS=['RGB','RBG','GRB','GBR','BRG','BGR','RGBW','GRBW','RGBWW'];
const CLOCKED=['APA102','SK9822','LPD8806'];
const DMX_P=['DMX512'];

function makeChanPanel(i) {
  const p = document.createElement('div');
  p.className='panel'; p.id='panel-ch'+i;
  const protoOpts=PROTOCOLS.map(n=>`<option value="${n}">${n}</option>`).join('');
  const orderOpts=ORDERS.map(n=>`<option value="${n}">${n}</option>`).join('');
  p.innerHTML=`<div class="card">
    <div class="row"><label>Protocol</label><select id="ch${i}-proto" onchange="updateChanVis(${i})">${protoOpts}</select></div>
    <div id="ch${i}-led-fields">
      <div class="row"><label>Universe start</label><input id="ch${i}-uni" type="number" min="1" max="32767"></div>
      <div class="row"><label>DMX start</label><input id="ch${i}-dmx" type="number" min="1" max="512"></div>
      <div id="ch${i}-pixrow" class="row"><label>Pixels</label><input id="ch${i}-pix" type="number" min="1" max="1024"></div>
      <div id="ch${i}-orderrow" class="row"><label>Color order</label><select id="ch${i}-order">${orderOpts}</select></div>
      <div id="ch${i}-brirow" class="row"><label>Brightness</label><input id="ch${i}-bri" type="number" min="0" max="255"></div>
      <div id="ch${i}-grprow" class="row"><label>Grouping</label><input id="ch${i}-grp" type="number" min="1" max="8"></div>
      <div id="ch${i}-invrow" class="row"><label>Invert</label><input id="ch${i}-inv" type="checkbox"></div>
      <div id="ch${i}-clkrow" class="row"><label>Clock Hz</label><input id="ch${i}-clk" type="number" min="100000" max="8000000" step="250000"></div>
    </div>
    <button onclick="saveChan(${i})">Save</button>
    <div class="status" id="st-ch${i}"></div>
  </div>`;
  return p;
}

const container=document.body;
for(let i=0;i<8;i++) container.appendChild(makeChanPanel(i));

function updateChanVis(i) {
  const proto=document.getElementById('ch'+i+'-proto').value;
  const isDmx=DMX_P.includes(proto);
  const isOff=proto==='Off';
  const isClk=CLOCKED.includes(proto);
  const fields=document.getElementById('ch'+i+'-led-fields');
  fields.style.display=isOff?'none':'';
  if(!isOff){
    const show=(id,v)=>{const el=document.getElementById('ch'+i+'-'+id+'row');if(el)el.style.display=v?'':'none';};
    show('pix',true);
    show('order',!isDmx);
    show('bri',!isDmx);
    show('grp',!isDmx);
    show('inv',!isDmx);
    show('clk',isClk);
    const lbl=document.getElementById('ch'+i+'-pixrow').querySelector('label');
    if(lbl)lbl.textContent=isDmx?'Slots':'Pixels';
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click',e=>{
  const tab=e.target.closest('.tab');
  if(!tab)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  tab.classList.add('active');
  const panel=document.getElementById('panel-'+tab.dataset.panel);
  if(panel)panel.classList.add('active');
});

// ── API helpers ──────────────────────────────────────────────────────────────
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(path,opts);
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

function status(id,msg,err){
  const el=document.getElementById(id);
  el.textContent=msg;el.className='status'+(err?' err':'');
}

// ── Load config on boot ───────────────────────────────────────────────────────
async function loadConfig(){
  try{
    const d=await api('GET','/api/config');
    const g=d.global;
    // Global
    setVal('g-refresh',g.refresh_hz);
    setVal('g-home',g.home_timeout_s);
    setChk('g-web',g.web_enabled);
    // Network
    setChk('n-dhcp',g.dhcp);
    setVal('n-ip',g.ip);
    setVal('n-mask',g.mask);
    setVal('n-gw',g.gw);
    // ArtNet
    setVal('a-net',g.net);
    setVal('a-subnet',g.subnet);
    setVal('a-short',g.short_name);
    setVal('a-long',g.long_name);
    setChk('a-unicast',g.reply_unicast);
    // Channels
    for(let i=0;i<8;i++){
      const c=d.channels[i];
      setVal('ch'+i+'-proto',c.protocol);
      setVal('ch'+i+'-uni',c.universe_start);
      setVal('ch'+i+'-dmx',c.dmx_start);
      setVal('ch'+i+'-pix',c.pixel_count);
      setVal('ch'+i+'-order',c.color_order);
      setVal('ch'+i+'-bri',c.brightness);
      setVal('ch'+i+'-grp',c.grouping);
      setChk('ch'+i+'-inv',c.invert);
      setVal('ch'+i+'-clk',c.clock_hz);
      updateChanVis(i);
    }
    // Status bar
    const link=document.getElementById('link-dot');
    link.className=d.link?'up':'';
    document.getElementById('fps-label').textContent=d.fps+'fps';
  }catch(e){console.error(e);}
}

function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v;}
function setChk(id,v){const el=document.getElementById(id);if(el)el.checked=!!v;}

// ── Save helpers ─────────────────────────────────────────────────────────────
const FIELD_MAP={
  'dhcp':()=>document.getElementById('n-dhcp').checked?1:0,
  'ip':()=>document.getElementById('n-ip').value,
  'mask':()=>document.getElementById('n-mask').value,
  'gw':()=>document.getElementById('n-gw').value,
  'net':()=>parseInt(document.getElementById('a-net').value),
  'subnet':()=>parseInt(document.getElementById('a-subnet').value),
  'short_name':()=>document.getElementById('a-short').value,
  'long_name':()=>document.getElementById('a-long').value,
  'reply_unicast':()=>document.getElementById('a-unicast').checked?1:0,
  'refresh_hz':()=>parseInt(document.getElementById('g-refresh').value),
  'home_timeout_s':()=>parseInt(document.getElementById('g-home').value),
  'web_enabled':()=>document.getElementById('g-web').checked?1:0,
};

const STATUS_MAP={
  'dhcp':'st-network','ip':'st-network','mask':'st-network','gw':'st-network',
  'net':'st-artnet','subnet':'st-artnet','short_name':'st-artnet','long_name':'st-artnet','reply_unicast':'st-artnet',
  'refresh_hz':'st-global','home_timeout_s':'st-global','web_enabled':'st-global',
};

async function saveGlobal(keys){
  const body={};
  keys.forEach(k=>{if(FIELD_MAP[k])body[k]=FIELD_MAP[k]();});
  const stId=STATUS_MAP[keys[0]]||'st-global';
  try{
    await api('POST','/api/global',body);
    status(stId,'Saved','');
  }catch(e){status(stId,'Error: '+e.message,true);}
}

async function saveChan(i){
  const proto=document.getElementById('ch'+i+'-proto').value;
  const body={
    protocol:proto,
    universe_start:parseInt(document.getElementById('ch'+i+'-uni').value),
    dmx_start:parseInt(document.getElementById('ch'+i+'-dmx').value),
    pixel_count:parseInt(document.getElementById('ch'+i+'-pix').value),
    color_order:document.getElementById('ch'+i+'-order').value,
    brightness:parseInt(document.getElementById('ch'+i+'-bri').value),
    grouping:parseInt(document.getElementById('ch'+i+'-grp').value),
    invert:document.getElementById('ch'+i+'-inv').checked?1:0,
    clock_hz:parseInt(document.getElementById('ch'+i+'-clk').value),
  };
  try{
    await api('POST','/api/channel/'+i,body);
    status('st-ch'+i,'Saved','');
  }catch(e){status('st-ch'+i,'Error: '+e.message,true);}
}

async function reboot(){
  if(!confirm('Reboot device?'))return;
  try{await api('POST','/api/reboot',{});status('st-sys','Rebooting...','');}
  catch(e){status('st-sys','Sent (connection will drop)','');}
}

async function factoryReset(){
  if(!confirm('Factory reset? All config will be lost.'))return;
  try{await api('POST','/api/factory-reset',{});status('st-sys','Done — reboot recommended','');}
  catch(e){status('st-sys','Error: '+e.message,true);}
}

loadConfig();
</script>
</body>
</html>
