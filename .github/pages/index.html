<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Root entry point: not a content page. It detects the visitor's
         preferred language and forwards to the suffixed landing page so every
         real page is named with its language code (index-en / index-fr). -->
    <title>pixfrog</title>
    <link rel="icon" type="image/svg+xml" href="./img/logo.svg" />
    <link rel="alternate" hreflang="en" href="./index-en.html" />
    <link rel="alternate" hreflang="fr" href="./index-fr.html" />
    <link rel="canonical" href="./index-en.html" />
    <script src="./lang.js"></script>
    <script>routeLang("./index-en.html", "./index-fr.html");</script>
    <!-- No-JS fallback: land on the English page. -->
    <noscript><meta http-equiv="refresh" content="0; url=./index-en.html" /></noscript>
  </head>
  <body>
    <noscript><a href="./index-en.html">Enter pixfrog</a></noscript>
  </body>
</html>
