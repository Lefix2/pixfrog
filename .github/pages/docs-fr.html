<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <script src="./lang.js"></script>
    <script>initLang("fr", "./docs-en.html");</script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pixfrog — documentation</title>
    <meta
      name="description"
      content="Documentation technique de pixfrog : architecture, matériel et protocoles LED sur l'ESP32-P4."
    />
    <link rel="alternate" hreflang="fr" href="./docs-fr.html" />
    <link rel="alternate" hreflang="en" href="./docs-en.html" />
    <link rel="icon" type="image/svg+xml" href="./img/logo.svg" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      media="(prefers-color-scheme: light)"
      href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github.min.css"
    />
    <link
      rel="stylesheet"
      media="(prefers-color-scheme: dark)"
      href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github-dark.min.css"
    />
  </head>
  <body>
    <header class="nav">
      <div class="wrap nav-inner">
        <a class="brand" href="./index-fr.html"><img class="logo-img" src="./img/logo.svg" alt="" width="30" height="30" /> pixfrog</a>
        <nav class="nav-links">
          <a class="keep" href="./flash-fr.html">Flash</a>
          <a class="keep active" href="./docs-fr.html">Docs</a>
          <a class="keep" href="./about-fr.html">À propos</a>
          <a class="keep lang" href="#" onclick="switchLang('en','./docs-en.html');return false;" title="English version">🇬🇧</a>
          <a class="gh" href="https://github.com/Lefix2/pixfrog">GitHub ↗</a>
        </nav>
      </div>
    </header>

    <main class="wrap docs">
      <aside class="sidebar">
        <h4>Documentation</h4>
        <nav id="doc-nav">
          <a href="#architecture" data-doc="architecture">Architecture</a>
          <a href="#hardware" data-doc="hardware">Matériel</a>
          <a href="#protocols" data-doc="protocols">Protocoles LED</a>
        </nav>
        <h4>Sur cette page</h4>
        <nav id="toc" class="toc"></nav>
      </aside>

      <article id="content" class="prose">
        <p>Chargement…</p>
      </article>
    </main>

    <footer>
      <div class="wrap foot-inner">
        <span>🐸 pixfrog · <span id="version-foot">docs</span> · MIT licensed</span>
        <span>
          <a href="./index-fr.html">Flasher</a> ·
          <a href="https://github.com/Lefix2/pixfrog">Source</a>
        </span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
    <script>
      const DOCS = {
        architecture: { title: "Architecture", file: "./docs/architecture.md" },
        hardware: { title: "Matériel", file: "./docs/hardware.md" },
        protocols: { title: "Protocoles LED", file: "./docs/protocols.md" },
      };

      const slug = (s) =>
        s.toLowerCase().replace(/[^\w\s-]/g, "").trim().replace(/\s+/g, "-");

      function currentKey() {
        const k = location.hash.replace(/^#/, "");
        return DOCS[k] ? k : "architecture";
      }

      async function render(key) {
        const content = document.getElementById("content");
        const meta = DOCS[key];
        document.querySelectorAll("#doc-nav a").forEach((a) => {
          a.classList.toggle("active", a.dataset.doc === key);
        });
        content.innerHTML = "<p>Chargement…</p>";
        let md;
        try {
          const res = await fetch(meta.file);
          if (!res.ok) throw new Error(res.status);
          md = await res.text();
        } catch (e) {
          content.innerHTML =
            "<p>Impossible de charger ce document. Il est publié avec chaque release — " +
            'voir <a href="https://github.com/Lefix2/pixfrog/tree/main/docs">la doc sur GitHub</a>.</p>';
          document.getElementById("toc").innerHTML = "";
          return;
        }

        marked.setOptions({ gfm: true, breaks: false });
        content.innerHTML = marked.parse(md);

        content.querySelectorAll("pre code").forEach((el) => {
          try { hljs.highlightElement(el); } catch (_) {}
        });

        const toc = document.getElementById("toc");
        toc.innerHTML = "";
        const seen = {};
        content.querySelectorAll("h2, h3").forEach((h) => {
          let id = slug(h.textContent);
          if (seen[id]) id += "-" + ++seen[id];
          else seen[id] = 1;
          h.id = id;
          const a = document.createElement("a");
          a.href = "#" + key;
          a.textContent = h.textContent;
          if (h.tagName === "H3") a.className = "lvl3";
          a.addEventListener("click", (ev) => {
            ev.preventDefault();
            h.scrollIntoView({ behavior: "smooth", block: "start" });
          });
          toc.appendChild(a);
        });

        content.querySelectorAll("img").forEach((img) => {
          img.addEventListener("error", () => (img.style.display = "none"));
        });

        document.title = "pixfrog — " + meta.title;
        window.scrollTo({ top: 0 });
      }

      window.addEventListener("hashchange", () => render(currentKey()));
      render(currentKey());

      fetch("https://api.github.com/repos/Lefix2/pixfrog/releases/latest")
        .then((r) => (r.ok ? r.json() : null))
        .then((rel) => {
          if (rel && rel.tag_name)
            document.getElementById("version-foot").textContent = rel.tag_name;
        })
        .catch(() => {});
    </script>
  </body>
</html>
