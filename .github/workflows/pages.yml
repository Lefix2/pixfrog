name: Pages

# Deploy the static site (browser flasher + docs viewer) to GitHub Pages.
# Decoupled from firmware releases: the site ships no binaries — its
# manifest points at the "latest" GitHub Release asset, so a copy/CSS edit
# goes live on a plain push to main, with no firmware version bump.
on:
  push:
    branches: [main]
    paths:
      - '.github/pages/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

# Let a release-triggered deploy and a content deploy queue rather than clobber.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Assemble static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Assemble pages site
        shell: bash
        run: |
          mkdir -p site
          # Static site assets (landing + flasher + docs viewer + about + theme).
          cp .github/pages/index.html    site/index.html
          cp .github/pages/flash.html    site/flash.html
          cp .github/pages/docs.html     site/docs.html
          cp .github/pages/about.html    site/about.html
          cp .github/pages/style.css     site/style.css
          # esp-web-tools manifest — points at the latest Release asset, so the
          # flasher always serves the newest firmware without redeploying.
          cp .github/pages/manifest.json site/manifest.json
          # Technical docs, rendered client-side by docs.html.
          mkdir -p site/docs
          cp docs/ARCHITECTURE.md site/docs/architecture.md
          cp docs/HARDWARE.md     site/docs/hardware.md
          cp docs/PROTOCOLS.md    site/docs/protocols.md
          # Diagrams / screenshots (optional; pages hide any that are absent).
          if [ -d docs/img ]; then mkdir -p site/img && cp -r docs/img/. site/img/; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Enable Pages (GitHub Actions source)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
