name: Release

# Build a flashable firmware image on every version tag and publish it as a
# GitHub Release. The browser flasher itself lives on Pages (see pages.yml)
# and points at this release's "latest" assets — so the site never needs a
# redeploy when a new firmware ships.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5
    env:
      IDF_CCACHE_ENABLE: '1'
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v5

      - name: Cache ccache objects
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-v5.5-${{ github.sha }}
          restore-keys: |
            ccache-v5.5-

      - name: idf.py build (esp32p4)
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32p4
          idf.py build

      - name: Collect firmware images
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          mkdir -p dist
          # Single image flashable at offset 0x0 — what the browser flasher uses.
          # Absolute -o: idf.py runs esptool from build/, so a relative path
          # would land in build/dist/ instead of the repo-root dist/.
          idf.py merge-bin -f raw -o "$PWD/dist/pixfrog-merged.bin"
          # Individual parts for CLI / advanced flashing.
          cp build/bootloader/bootloader.bin           dist/
          cp build/partition_table/partition-table.bin dist/
          cp build/pixfrog.bin                         dist/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: dist

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: dist
      - name: Create or update release with firmware assets
        env:
          GH_TOKEN: ${{ github.token }}
        # Idempotent: if the release was pre-created from the GitHub UI (or by
        # a previous workflow run), just upload/overwrite the firmware assets
        # on it. Otherwise create it from scratch.
        run: |
          assets=(
            dist/pixfrog-merged.bin
            dist/bootloader.bin
            dist/partition-table.bin
            dist/pixfrog.bin
          )
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — uploading assets."
            gh release upload "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              "${assets[@]}"
          else
            echo "Creating release $GITHUB_REF_NAME."
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "pixfrog $GITHUB_REF_NAME" \
              --generate-notes \
              "${assets[@]}"
          fi
