name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install clang-format 18
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: clang-format --dry-run -Werror on every C/C++ source
        run: |
          files=$(git ls-files '*.cpp' '*.h')
          echo "Checking $(echo "$files" | wc -l) files..."
          echo "$files" | xargs clang-format --dry-run -Werror --style=file

  host-tests:
    name: Host unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: led_protocols (timings, encoders, perf)
        run: |
          cd components/led_protocols/test
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ./build/test_led_protocols

      - name: dmx_logic (sizing, capacity, decoder)
        run: |
          cd components/dmx_manager/test
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ./build/test_dmx_logic

      - name: artnet_parser (header, dmx, filter, PollReply, Address, IpProg, Nzs)
        run: |
          cd components/artnet/test
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ./build/test_artnet_parser

      - name: config_store (struct layout, NVS migration)
        run: |
          cd components/config_store/test
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ./build/test_config_store

      - name: sacn_parser (root/framing/DMP, sync, source gate)
        run: |
          cd components/sacn/test
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ./build/test_sacn_parser

      - name: fseq_parser (header, offsets, sparse ranges, channel mapping)
        run: |
          cd components/fseq_player/test
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ./build/test_fseq_parser

  emulator:
    name: UI emulator (SDL2 host build + smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Build emulator
        run: |
          cd tools/emulator
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Headless menu-FSM smoke test
        run: ./tools/emulator/smoke.sh

  idf-build:
    name: ESP-IDF build for esp32p4 (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ESP32-P4 needs IDF v5.5+: the LCD_CAM RGB panel driver used by
        # led_output is gated behind SOC_LCD_RGB_SUPPORTED, which is only
        # enabled for the P4 from v5.4 (IDF-7465), and the v5.4 esp_eth
        # ETH_ESP32_EMAC_DEFAULT_CONFIG() macro uses out-of-order designated
        # initializers that g++ rejects (fixed in v5.5).
        idf_version: ['v5.5']
        # Build every config variant so each compile path stays green:
        # oled = the default sdkconfig (PARLIO LED backend); tft = overlay
        # selecting ST7789. The legacy LCD_CAM LED backend (overlay
        # sdkconfig.ci.lcdcam) is no longer CI-built — kept for manual
        # debugging only.
        variant: ['oled', 'tft']
    container:
      # Image ships IDF preinstalled at $IDF_PATH; we source export.sh below.
      image: espressif/idf:${{ matrix.idf_version }}
    env:
      # idf.py wraps the compilers with ccache; persisting CCACHE_DIR across runs
      # turns a full IDF recompile into ~99% cache hits (cuts most of the build).
      IDF_CCACHE_ENABLE: '1'
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      # Full history + tags: the firmware version is `git describe --tags`
      # evaluated at CMake configure time (see top-level CMakeLists.txt).
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache ccache objects
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          # New key every commit so the cache is always re-saved; restore-keys
          # falls back to the most recent prior cache to stay warm.
          key: ccache-${{ matrix.idf_version }}-${{ matrix.variant }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.idf_version }}-${{ matrix.variant }}-

      - name: idf.py set-target esp32p4 && idf.py build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py --version
          if [ "${{ matrix.variant }}" = "tft" ]; then
            export SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.ci.tft"
          fi
          idf.py set-target esp32p4
          idf.py build

      - name: Show binary size & ccache stats
        if: always()
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py size || true
          ccache -s || true
